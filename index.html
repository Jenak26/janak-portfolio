<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ============================================================
         FAVICON
         Place a square 512x512 version of your photo/logo as
         /public/favicon.png for best results across all browsers.
    ============================================================ -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============================================================
         PRIMARY SEO
         These are what Google indexes and shows in search results.
    ============================================================ -->
    <title>Janak Kabra | Full-Stack Developer & CSE Undergrad</title>
    <meta
      name="description"
      content="Portfolio of Janak Kabra — CSE undergrad at VIT Vellore, full-stack developer, and open to work. Building with React, Node.js, and modern web tech."
    />
    <meta name="author" content="Janak Kabra" />
    <meta
      name="keywords"
      content="Janak Kabra, portfolio, web developer, React developer, VIT Vellore, CSE, full stack, frontend developer, open to work"
    />

    <!-- Tells crawlers to index this page and follow links -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL — prevents duplicate content issues if your
         site is ever accessible at multiple URLs -->
    <link rel="canonical" href="https://janakkabra.in/" />

    <!-- ============================================================
         OPEN GRAPH (og:)
         Controls how your link looks when shared on LinkedIn,
         WhatsApp, Facebook, Discord, Slack etc.
         Replace og:image with a real 1200x630 screenshot of your site.
    ============================================================ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://janakkabra.in/" />
    <meta
      property="og:title"
      content="Janak Kabra | Full-Stack Developer & CSE Undergrad"
    />
    <meta
      property="og:description"
      content="Portfolio of Janak Kabra — CSE undergrad at VIT Vellore, full-stack developer, and open to work. Building with React, Node.js, and modern web tech."
    />
    <!-- Create a 1200x630px screenshot of your site and save it as
         /public/og-image.png for the best link preview quality -->
    <meta property="og:image" content="https://janakkabra.in/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Janak Kabra Portfolio" />
    <meta property="og:site_name" content="Janak Kabra" />
    <meta property="og:locale" content="en_IN" />

    <!-- ============================================================
         TWITTER CARD
         Controls how your link looks when shared on X (Twitter).
         "summary_large_image" shows a big preview image.
    ============================================================ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://janakkabra.in/" />
    <meta
      name="twitter:title"
      content="Janak Kabra | Full-Stack Developer & CSE Undergrad"
    />
    <meta
      name="twitter:description"
      content="Portfolio of Janak Kabra — CSE undergrad at VIT Vellore, full-stack developer, and open to work."
    />
    <meta name="twitter:image" content="https://janakkabra.in/og-image.png" />
    <!-- Your Twitter/X handle -->
    <meta name="twitter:creator" content="@janak484457" />

    <!-- ============================================================
         THEME COLOR
         Tints the browser chrome on mobile (Android Chrome, Safari).
         Using your red accent to match the site aesthetic.
    ============================================================ -->
    <meta name="theme-color" content="#ff4d4d" />

    <!-- ============================================================
         PERFORMANCE HINTS
         Preconnect warms up the connection to Google Fonts before
         the CSS requests them, shaving ~100-300ms off font load.
    ============================================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
